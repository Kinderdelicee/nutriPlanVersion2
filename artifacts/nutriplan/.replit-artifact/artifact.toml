kind = "web"
previewPath = "/"
title = "NutriPlan"
version = "1.0.0"
id = "artifacts/nutriplan"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24082

[services.development]
run = "pnpm --filter @workspace/nutriplan run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nutriplan", "run", "build" ]
publicDir = "artifacts/nutriplan/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24082"
BASE_PATH = "/"
